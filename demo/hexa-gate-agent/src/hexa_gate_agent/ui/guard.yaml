# Fortify Guard — served by GET /agents/guard/ui.
# The active agent's main_color is the only accent color in the product.
#
# A transcript + composer, plus a tool-calls widget so the get_server_time call
# (forwarded as fortify tool_start/tool_end -> translated to the rich tool
# envelope) is visible. See custom-UI/docs/widgets.md for the full catalog.
page:
  layout_type: grid
  main_color: "#10b981"

widgets:
  - name: transcript
    type: ai-response
    position: { horizontal: left, vertical: high }
    size: { width: 8, height: 520 }
    empty_text: "Ask Fortify Guard something — try \"what time is it?\""
    thinking_indicator: dots

  # Name is the dev's free choice — unaddressed tool-calls route to the first
  # widget of TYPE `tool-calls`, so this can be called anything.
  - name: tools
    type: tool-calls
    position: { horizontal: right, vertical: high }
    size: { width: 4, height: 520 }
    empty_text: "Tool calls will appear here."

  - name: chat-input
    type: ai-chat-input
    position: { horizontal: left, vertical: low }
    size: { width: 12, height: auto }
    placeholder: "Message Fortify Guard…"
    rows: 2
