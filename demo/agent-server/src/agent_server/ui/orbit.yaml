# Orbit — Research workspace (Google ADK / Gemini). Served by GET /agents/orbit/ui.
# Showcases the widget actions + data-source system (CONTRACT.md §5b): the
# `sources` table reads its `data_source` action; the buttons fire side-effect
# actions and name `sources` in `refresh`, so it re-pulls. The agent stays the
# only color (main_color → --accent).
page:
  layout_type: grid
  main_color: "#b0714f"

widgets:
  - name: transcript
    type: ai-response
    position: { horizontal: left, vertical: high }
    size: { width: 8, height: 420 }
    empty_text: "Ask Orbit, or run a sample search to populate sources."
    thinking_indicator: dots

  - name: tool-calls
    type: tool-calls
    position: { horizontal: right, vertical: high }
    size: { width: 4, height: 420 }
    title: Steps
    empty_text: "Tool steps appear here."

  # Display widget — pulls its rows from the `list_sources` action, and re-pulls
  # whenever an action below lists `sources` in `refresh`.
  - name: sources
    type: table
    position: { horizontal: left, vertical: middle }
    size: { width: 8, height: auto }
    data_source: { action: list_sources }
    has_header: true
    empty_text: "No sources yet — run a sample search."

  # Side-effect actions. Each returns a `{result}` and re-pulls `sources`.
  - name: source-actions
    type: button-group
    position: { horizontal: right, vertical: middle }
    size: { width: 4, height: auto }
    orientation: vertical
    buttons:
      - { label: "Run sample search", action: seed_sources, refresh: [sources] }
      - { label: "Clear sources", action: clear_sources, variant: secondary, refresh: [sources] }

  - name: chat-input
    type: ai-chat-input
    position: { horizontal: left, vertical: low }
    size: { width: 12, height: auto }
    placeholder: "Ask Orbit…"
    rows: 2
