# Healthcare — clinical assistant (OpenAI Agents SDK). Served by GET /agents/healthcare/ui.
# Chat + a tool-calls panel so the clinical tools (get_patient_record, prescribe,
# share_record, …) are visible as they fire. The active agent's main_color is the
# only accent in the product.
page:
  layout_type: grid
  main_color: "#0ea5b7"

widgets:
  - name: transcript
    type: ai-response
    position: { horizontal: left, vertical: high }
    size: { width: 8, height: 520 }
    empty_text: "Ask the clinical assistant — e.g. \"Pull up the full record for patient 88.\""
    thinking_indicator: dots

  - name: tool-calls
    type: tool-calls
    position: { horizontal: right, vertical: high }
    size: { width: 4, height: 520 }
    title: Clinical steps
    empty_text: "Tool calls (record lookups, orders, prescriptions…) appear here."

  - name: chat-input
    type: ai-chat-input
    position: { horizontal: left, vertical: low }
    size: { width: 12, height: auto }
    placeholder: "Message the clinical assistant…"
    rows: 2
