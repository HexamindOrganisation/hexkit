# OPTIONAL. The proxy defaults to a local SQLite file (no server needed). Use
# this only to run on Postgres: `docker compose up -d`, install the proxy's
# `postgres` extra, and set
#   PLATFORM_DATABASE_URL=postgresql+asyncpg://platform:platform@127.0.0.1:5433/platform
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    ports:
      - "5433:5432"
    volumes:
      - platform_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d platform"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  platform_pgdata:
