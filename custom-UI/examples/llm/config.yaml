# yaml-language-server: $schema=../../agent-ui.schema.json
page:
  layout_type: "grid"
  # Curated palette: pick a mode + a single accent color. All other shadcn
  # tokens (background, foreground, muted, border, …) stay at the values
  # tuned for that mode.
  theme:
    mode: "dark"           # "light" | "dark" | "system"
    accent: "#469BE5"       # any hex — flows to --primary, --ring, focus rings, hovers

widgets:
  - name: "header"
    type: "page-header"
    position:
      horizontal: "left"
      vertical: "high"
    size:
      width: 12
      height: "auto"
    title: "My Dashboard"
    subtitle: "agent-ui llm example"

  - name: "Quick actions"
    type: "button-group"
    position:
      horizontal: "left"
      vertical: "high"
    size:
      width: 12
      height: "auto"
    buttons:
      - label: "Refresh"
        action: "refresh_data"
        variant: "default"
      - label: "Settings"
        action: "open_settings"
        variant: "outline"
      - label: "Delete all"
        action: "delete_all"
        variant: "destructive"

  - name: "metrics"
    type: "metrics"
    position:
      horizontal: "left"
      vertical: "high"
    size:
      width: 12
      height: "auto"
    data_source:
      action: "get_metrics"
      subscribe: true
    columns: 4
    loading_text: "Waiting for the first request…"
    metrics:
      - id: "requests"
        label: "Requests"
        format: "number"
      - id: "total_tokens"
        label: "Total tokens"
        format: "number"
      - id: "cost"
        label: "Cost"
        format: "currency"
        precision: 4
      - id: "latency"
        label: "Last latency"
        format: "duration"

  - name: "Files"
    type: "file-tree"
    position:
      horizontal: "left"
      vertical: "middle"
    size:
      width: 3
      height: 400
    data_source:
      action: "list_user_files"
    on_select: "open_file"
    file_actions:
      - name: "Open"
        action: "open_file"
      - name: "Delete"
        action: "delete_file"

  - name: "agent-output"
    type: "ai-response"
    position:
      horizontal: "left"
      vertical: "middle"
    size:
      width: 6
      height: "auto"
    empty_text: "Ask the agent something below."

  - name: "history"
    type: "ai-history"
    position:
      horizontal: "right"
      vertical: "middle"
    size:
      width: 3
      height: "auto"
    data_source:
      action: "list_conversations"
      subscribe: true
    on_select: "load_conversation"
    on_new_chat: "create_conversation"
    empty_text: "No past conversations"

  - name: "chat-input"
    type: "ai-chat-input"
    position:
      horizontal: "left"
      vertical: "low"
    size:
      width: 12
      height: "auto"
    placeholder: "Ask the agent…"

  - name: "footer"
    type: "page-footer"
    size:
      width: 12
      height: "auto"
    text: "agent-ui app"
