# yaml-language-server: $schema=../../agent-ui.schema.json
page:
  layout_type: "sidebar"
  theme:
    mode: "light"
    accent: "#469BE5"
  main_menu:
    - { name: "Overview", action: "view_overview" }
    - { name: "Run task", action: "view_run" }
    - { name: "Settings", action: "open_settings" }

widgets:
  - name: "header"
    type: "page-header"
    size: { width: 12, height: "auto" }
    title: "Layout Showcase"
    subtitle: "layout_type: sidebar — main_menu on the left, grid in the main pane"

  - name: "readme"
    type: "markdown"
    size: { width: 6, height: "auto" }
    position: { horizontal: "left", vertical: "middle" }
    content: |
      ## Welcome

      This example renders the **same five widgets** under four different
      layouts. Switch layouts in the top bar to see how `layout_type`
      reshapes the page without touching the widget definitions.

      - `grid` — twelve-column grid with `position` and `size.width`
      - `flex` — stacked, `size.width` becomes a percentage
      - `sidebar` — `main_menu` on the left, widgets in the main pane
      - `tabs` — widgets grouped by their `tab` field

      Below is a **form** widget that dispatches its values through the
      `ActionDispatcher` on submit. The dispatcher in this example just
      logs to the console — there is no backend wired in.

  - name: "run-task"
    type: "form"
    size: { width: 6, height: "auto" }
    position: { horizontal: "right", vertical: "middle" }
    submit_action: "run_task"
    submit_label: "Run task"
    reset_label: "Reset"
    columns: 1
    success_message: "Task queued (logged to console)."
    fields:
      - id: "name"
        label: "Task name"
        type: "text"
        required: true
        max_length: 60
        placeholder: "weekly-rollup"
      - id: "model"
        label: "Model"
        type: "select"
        default: "claude-opus-4-7"
        options:
          - { label: "Opus 4.7",  value: "claude-opus-4-7" }
          - { label: "Sonnet 4.6", value: "claude-sonnet-4-6" }
          - { label: "Haiku 4.5",  value: "claude-haiku-4-5-20251001" }
      - id: "max_steps"
        label: "Max steps"
        type: "number"
        default: 10
        min: 1
        max: 100
      - id: "dry_run"
        label: "Dry run"
        type: "checkbox"
        default: false

  - name: "actions"
    type: "button-group"
    size: { width: 12, height: "auto" }
    position: { horizontal: "left", vertical: "low" }
    buttons:
      - { label: "Refresh",  action: "refresh_data", variant: "default"  }
      - { label: "Settings", action: "open_settings", variant: "outline" }

  - name: "footer"
    type: "page-footer"
    size: { width: 12, height: "auto" }
    text: "agent-ui · layout showcase"
