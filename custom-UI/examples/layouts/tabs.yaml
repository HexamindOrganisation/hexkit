# yaml-language-server: $schema=../../agent-ui.schema.json
page:
  layout_type: "tabs"
  theme:
    mode: "light"
    accent: "#469BE5"

widgets:
  - name: "header"
    type: "page-header"
    tab: "Overview"
    size: { width: 12, height: "auto" }
    title: "Layout Showcase"
    subtitle: "layout_type: tabs — widgets grouped by their `tab` field"

  - name: "readme"
    type: "markdown"
    tab: "Overview"
    size: { width: 12, height: "auto" }
    content: |
      ## Welcome

      This example renders the **same five widgets** under four different
      layouts. Switch layouts in the top bar to see how `layout_type`
      reshapes the page without touching the widget definitions.

      - `grid` — twelve-column grid with `position` and `size.width`
      - `flex` — stacked, `size.width` becomes a percentage
      - `sidebar` — `main_menu` on the left, widgets in the main pane
      - `tabs` — widgets grouped by their `tab` field

      Move to the **Run task** tab to try the form widget. The dispatcher
      in this example just logs to the console — there is no backend
      wired in.

  - name: "run-task"
    type: "form"
    tab: "Run task"
    size: { width: 12, height: "auto" }
    submit_action: "run_task"
    submit_label: "Run task"
    reset_label: "Reset"
    columns: 2
    success_message: "Task queued (logged to console)."
    fields:
      - id: "name"
        label: "Task name"
        type: "text"
        required: true
        max_length: 60
        placeholder: "weekly-rollup"
      - id: "model"
        label: "Model"
        type: "select"
        default: "claude-opus-4-7"
        options:
          - { label: "Opus 4.7",  value: "claude-opus-4-7" }
          - { label: "Sonnet 4.6", value: "claude-sonnet-4-6" }
          - { label: "Haiku 4.5",  value: "claude-haiku-4-5-20251001" }
      - id: "max_steps"
        label: "Max steps"
        type: "number"
        default: 10
        min: 1
        max: 100
      - id: "dry_run"
        label: "Dry run"
        type: "checkbox"
        default: false

  - name: "actions"
    type: "button-group"
    tab: "Run task"
    size: { width: 12, height: "auto" }
    buttons:
      - { label: "Refresh",  action: "refresh_data", variant: "default"  }
      - { label: "Settings", action: "open_settings", variant: "outline" }

  - name: "footer"
    type: "page-footer"
    size: { width: 12, height: "auto" }
    text: "agent-ui · layout showcase"
