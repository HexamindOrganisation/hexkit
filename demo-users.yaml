# Demo users for HexUI. Loaded at startup when PLATFORM_DEMO_USERS_FILE
# points at this file (`make dev` sets that env var by default).
#
# Idempotent: existing rows (matched by email) are LEFT ALONE — changing a
# password here won't overwrite the DB. Wipe /tmp/hexa_dev.sqlite to start
# fresh.
#
# DO NOT commit real credentials here. This file is for local demos with
# throwaway accounts.
#
# `role` is optional and opaque: hexgate-wrapped agents read it via
# `User(role=...)`. HexUI itself never interprets the string — every team
# defines their own role vocabulary in their hexgate policy. A role only
# means something to the agent whose policy defines it; talking to the other
# agent falls through to that policy's fail-closed `default` (deny).
#
# Password is `hexademo` for everyone (min length is 8).
users:

  # ── No role ── exercises the fail-closed `default` (deny) path on both agents
  - email: guest@example.com
    password: hexademo
    name: Sam Guest
    # role omitted on purpose

  # ── DevOps agent ── roles: viewer < operator < admin (devops_policy.yaml)
  - email: vince@hexamind.ai
    password: hexademo
    name: Vince Reilly        # read service logs only
    role: viewer
  - email: olivia@hexamind.ai
    password: hexademo
    name: Olivia Park         # restart/scale in dev & staging (replicas <= 10); prod walled off
    role: operator
  - email: aaron@hexamind.ai
    password: hexademo
    name: Aaron Mensah        # full ops incl. prod, higher cap, the only role that can delete
    role: admin

  # ── Healthcare agent ── roles: nurse, physician, billing_staff (healthcare_policy.yaml)
  - email: nadia@clinic.org
    password: hexademo
    name: Nadia               # clinical reads + order labs; cannot prescribe or share PHI
    role: nurse
  - email: priya@clinic.org
    password: hexademo
    name: Priya               # full clinical authority; controlled meds gated, PHI shares only to allowlisted domains
    role: physician
  - email: bianca@clinic.org
    password: hexademo
    name: Bianca              # billing/claims lookups only; clinical data walled off
    role: billing_staff
