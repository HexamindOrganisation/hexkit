# Demo users for HexUI. Loaded at startup when PLATFORM_DEMO_USERS_FILE
# points at this file (`make dev` sets that env var by default).
#
# Idempotent: existing rows (matched by email) are LEFT ALONE — changing a
# password here won't overwrite the DB. Wipe /tmp/hexa_dev.sqlite to start
# fresh.
#
# DO NOT commit real credentials here. This file is for local demos with
# throwaway accounts.
#
# `role` is optional and opaque: hexgate-wrapped agents read it via
# `User(role=...)`. HexUI itself never interprets the string — every team
# defines their own role vocabulary in their hexgate policy. The role string
# MUST match a role in the loaded policy, or the call falls through to the
# policy's default (most-restricted) path.
#
# Role vocabularies for the agent-server showcase agents (gated when
# HEXGATE_KEY is set):
#   - healthcare (clinical assistant): nurse, doctor, billing, admin
#       nurse   → read records/labs, order tests; prescribe/share gated
#       doctor  → prescribe + clinical actions
#       billing → get_billing_summary only
#       admin   → full access incl. external share_record
#   - devops (infra assistant): viewer < operator < admin
#       viewer   → read_logs only; scale/delete denied
#       operator → scale_deployment within a per-role cap; delete denied
#       admin    → everything, incl. delete_resource
users:
  - email: dev01@hexamind.ai
    password: hexademo
    name: Dev One
    role: admin            # healthcare admin + devops admin (full access on both)
  - email: alice@example.com
    password: hexademo
    name: Alice Anderson
    role: billing          # healthcare billing (also the customer-support policy's billing role)
  - email: bob@example.com
    password: hexademo
    name: Bob Brown
    role: support          # customer-support policy role
  - email: carol@example.com
    password: hexademo
    name: Carol Carter
    # role omitted on purpose — exercises the no-role path through to the agent

  # --- healthcare showcase ---
  - email: dana@example.com
    password: hexademo
    name: Dana Doyle
    role: nurse            # healthcare: read/order allowed, prescribe + share gated
  - email: erin@example.com
    password: hexademo
    name: Erin Ellis
    role: doctor           # healthcare: prescribe allowed (change to "physician" if your policy uses that)

  # --- devops showcase ---
  - email: frank@example.com
    password: hexademo
    name: Frank Foster
    role: viewer           # devops: read_logs only; scale/delete denied
  - email: grace@example.com
    password: hexademo
    name: Grace Green
    role: operator         # devops: scale within cap; delete_resource denied
