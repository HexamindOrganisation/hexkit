agent_id: adk-hello
name: Hello Google ADK
framework: google-adk
entrypoint: agent.py
agent_callable: build_agent
version: 0.1.0
description: >
  Minimal Google ADK tool-calling agent. Exposes one tool
  (`get_current_time`) and replies to user questions using it.

capabilities:
  streaming: true
  tools: true
  state: false
  approvals: false
  multi_turn: true

env:
  - GOOGLE_API_KEY

extra:
  model: gemini-2.0-flash
