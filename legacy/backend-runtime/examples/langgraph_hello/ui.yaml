# Custom UI for this agent. Served by GET /agents/langgraph-hello/ui.
# The front-app falls back to its default chat layout when this file is absent.
#
# Layout (12-col grid):
#
#   ┌────────────────────────────────────────────────────────────┐
#   │  page-header                                               │  high
#   ├──────────────┬───────────────────────────┬─────────────────┤
#   │   help md    │     ai-response           │  tool-calls     │  middle
#   ├──────────────┴───────────────────────────┴─────────────────┤
#   │  ai-chat-input  (send + cancel stacked next to textarea)   │  low
#   └────────────────────────────────────────────────────────────┘
#
# The `tool-calls` widget MUST be named exactly `tool-calls` — that's the
# name the front-app's RuntimeBridge routes tool events to.

page:
  layout_type: grid
  main_color: "#6366F1"   # indigo accent; per-agent visual identity

widgets:
  - name: header
    type: page-header
    position: { horizontal: left, vertical: high }
    size: { width: 9, height: auto }
    title: LangGraph Hello
    subtitle: Bare StateGraph · model + tool nodes

  - name: action-buttons
    type: button-group
    position: { horizontal: right, vertical: high }
    size: { width: 3, height: auto }
    buttons:
      - label: "Inject test log"
        action: "inject_tool_log"
        args: { note: "demo injection" }
        variant: "outline"

  - name: help
    type: markdown
    position: { horizontal: left, vertical: middle }
    size: { width: 3, height: 480 }
    content: |
      ### Try it
      Ask anything. The agent has one tool:

      - `echo(text)` — echoes its argument.

      The chat transcript stays clean of tool noise. Tool invocations
      flow into the **Tool calls** panel on the right — click any entry
      to inspect arguments and output.

      The **Inject test log** button up top proves the actions system:
      it calls a user-defined Python function on the runtime which
      emits a synthetic row into the Tool calls panel.

      Use the stop button next to the input to cancel a run mid-stream.

  - name: transcript
    type: ai-response
    position: { horizontal: center, vertical: middle }
    size: { width: 6, height: 480 }
    empty_text: "Send a message to start a run."
    thinking_indicator: dots

  - name: tool-calls
    type: tool-calls
    position: { horizontal: right, vertical: middle }
    size: { width: 3, height: 480 }
    title: Tool calls
    empty_text: "Tool invocations appear here."

  - name: chat-input
    type: ai-chat-input
    position: { horizontal: left, vertical: low }
    size: { width: 12, height: auto }
    placeholder: "Ask the LangGraph agent…"
    rows: 2
