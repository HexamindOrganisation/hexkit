page:
  layout_type: "grid"
  theme:
    mode: "light"
    accent: "#2E86DE"

widgets:
  - name: "My Files"
    type: "file-tree"
    position:
      horizontal: "left"
      vertical: "high"
    size:
      width: 6
      height: 400
    data_source:
      action: "list_user_files"
    on_select: "open_file"

  - name: "My Tasks"
    type: "button-group"
    position:
      horizontal: "right"
      vertical: "high"
    size:
      width: 6
      height: "auto"
    buttons:
      - label: "Add task"
        action: "add_task"
      - label: "Clear"
        action: "clear_tasks"
        variant: "outline"
